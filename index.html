<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Читаем вместе 📖</title>
<style>
  :root{
    --bg:#f7f3ea;
    --panel:#ffffff;
    --accent:#5b6ee1;
    --accent-dark:#4453b8;
    --text:#2b2b2b;
    --border:#e3ddcf;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Georgia","Times New Roman",serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
  }
  #setup-screen{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
    padding:20px;
    text-align:center;
  }
  #setup-screen h1{margin:0 0 10px 0;font-size:28px;}
  #setup-screen p{color:#666;margin:0 0 10px 0;max-width:400px;}
  .setup-box{
    background:var(--panel);
    padding:30px;
    border-radius:16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
    gap:12px;
    width:100%;
    max-width:360px;
  }
  input, button, textarea{
    font-family:inherit;
    font-size:15px;
  }
  .setup-box input{
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    outline:none;
  }
  .setup-box input:focus{border-color:var(--accent);}
  .setup-box button{
    padding:11px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:background .15s;
  }
  .setup-box button:hover{background:var(--accent-dark);}
  .setup-box small{color:#888;}

  #main-screen{
    display:none;
    height:100vh;
    flex-direction:column;
  }
  header{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:10px 16px;
    background:var(--panel);
    border-bottom:1px solid var(--border);
  }
  header .room-badge{
    background:var(--bg);
    padding:6px 10px;
    border-radius:8px;
    font-size:13px;
    color:#555;
    border:1px solid var(--border);
  }
  header button, header label.upload-btn{
    padding:7px 12px;
    border:1px solid var(--border);
    background:var(--panel);
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
  }
  header button:hover, header label.upload-btn:hover{background:var(--bg);}
  header .spacer{flex:1;}
  #page-indicator{font-size:14px;color:#555;min-width:70px;text-align:center;}

  .container{
    flex:1;
    display:flex;
    overflow:hidden;
  }
  #reader{
    flex:1 1 65%;
    display:flex;
    flex-direction:column;
    padding:20px 30px;
    overflow:hidden;
    position:relative;
    border-right:1px solid var(--border);
  }
  #book-text{
    flex:1;
    overflow-y:auto;
    line-height:1.7;
    font-size:19px;
    white-space:pre-wrap;
    padding-right:10px;
  }
  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-top:14px;
  }
  .nav-row button{
    padding:9px 18px;
    border:none;
    background:var(--accent);
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
  }
  .nav-row button:disabled{background:#c9cbe0;cursor:not-allowed;}

  #chat{
    flex:0 0 35%;
    display:flex;
    flex-direction:column;
    background:var(--panel);
    max-width:380px;
  }
  #messages{
    flex:1;
    overflow-y:auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:8px;
    font-family:Arial, sans-serif;
  }
  .msg{
    max-width:85%;
    padding:8px 12px;
    border-radius:12px;
    background:var(--bg);
    font-size:14px;
    line-height:1.4;
    word-wrap:break-word;
  }
  .msg .name{font-weight:700;font-size:12px;color:var(--accent-dark);display:block;margin-bottom:2px;}
  .msg.me{align-self:flex-end;background:#dfe3ff;}
  #chat-form{
    display:flex;
    gap:8px;
    padding:10px;
    border-top:1px solid var(--border);
  }
  #chat-input{
    flex:1;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:20px;
    outline:none;
    font-family:Arial, sans-serif;
  }
  #chat-form button{
    padding:0 16px;
    border:none;
    background:var(--accent);
    color:white;
    border-radius:20px;
    cursor:pointer;
  }
  @media (max-width:760px){
    .container{flex-direction:column;}
    #reader{border-right:none;border-bottom:1px solid var(--border);flex:1 1 55%;}
    #chat{flex:1 1 45%;max-width:none;}
  }
</style>
</head>
<body>

<div id="setup-screen">
  <h1>📖 Читаем вместе</h1>
  <p>Введите один и тот же код комнаты у себя и у друга — книга и страницы будут синхронизированы онлайн, рядом есть чат.</p>
  <div class="setup-box">
    <input id="room-input" placeholder="Код комнаты (например: kniga123)" />
    <input id="name-input" placeholder="Ваше имя" />
    <button id="join-btn">Войти в комнату</button>
    <small>Если комнаты с таким кодом ещё нет — она создастся автоматически.</small>
  </div>
</div>

<div id="main-screen">
  <header>
    <span class="room-badge">Комната: <b id="room-label"></b></span>
    <label class="upload-btn">
      📂 Загрузить книгу (.txt)
      <input type="file" id="file-input" accept=".txt" style="display:none;">
    </label>
    <button id="font-minus">A−</button>
    <button id="font-plus">A+</button>
    <div class="spacer"></div>
    <button id="leave-btn">Выйти</button>
  </header>

  <div class="container">
    <div id="reader">
      <div id="book-text">Загрузите файл .txt с текстом книги — он появится у обоих читателей.</div>
      <div class="nav-row">
        <button id="prev-btn">← Назад</button>
        <span id="page-indicator">— / —</span>
        <button id="next-btn">Вперёд →</button>
      </div>
    </div>
    <div id="chat">
      <div id="messages"></div>
      <form id="chat-form">
        <input id="chat-input" placeholder="Написать сообщение..." autocomplete="off">
        <button type="submit">➤</button>
      </form>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ===== Firebase config =====
const firebaseConfig = {
  apiKey: "AIzaSyCdz7f48TYJCH-ourCeeMi3C7ZmSEOr9NU",
  authDomain: "rave-clone-2.firebaseapp.com",
  projectId: "rave-clone-2",
  storageBucket: "rave-clone-2.firebasestorage.app",
  messagingSenderId: "112111623912",
  appId: "1:112111623912:web:85fc83553bea1a35c2735d",
  measurementId: "G-B1Y6LD8858"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== State =====
let roomId = null;
let userName = null;
let pages = [];
let currentPage = 0;
let roomRef = null;
let unsubRoom = null;
let unsubChat = null;
let fontSize = 19;

// ===== Elements =====
const setupScreen = document.getElementById('setup-screen');
const mainScreen = document.getElementById('main-screen');
const roomInput = document.getElementById('room-input');
const nameInput = document.getElementById('name-input');
const joinBtn = document.getElementById('join-btn');
const roomLabel = document.getElementById('room-label');
const bookText = document.getElementById('book-text');
const pageIndicator = document.getElementById('page-indicator');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const fileInput = document.getElementById('file-input');
const leaveBtn = document.getElementById('leave-btn');
const fontMinus = document.getElementById('font-minus');
const fontPlus = document.getElementById('font-plus');
const messagesEl = document.getElementById('messages');
const chatForm = document.getElementById('chat-form');
const chatInput = document.getElementById('chat-input');

// Restore saved name
nameInput.value = localStorage.getItem('reader_name') || '';
roomInput.value = localStorage.getItem('reader_room') || '';

// ===== Join room =====
joinBtn.addEventListener('click', joinRoom);
roomInput.addEventListener('keydown', e => { if(e.key==='Enter') joinRoom(); });
nameInput.addEventListener('keydown', e => { if(e.key==='Enter') joinRoom(); });

async function joinRoom(){
  const rId = roomInput.value.trim();
  const name = nameInput.value.trim();
  if(!rId || !name){
    alert('Пожалуйста, укажите код комнаты и своё имя.');
    return;
  }
  roomId = rId;
  userName = name;
  localStorage.setItem('reader_name', name);
  localStorage.setItem('reader_room', rId);

  roomRef = db.collection('rooms').doc(roomId);
  const snap = await roomRef.get();
  if(!snap.exists){
    await roomRef.set({
      pages: ["Комната создана! Загрузите файл .txt с книгой — текст появится у обоих участников.", ],
      currentPage: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  roomLabel.textContent = roomId;
  setupScreen.style.display = 'none';
  mainScreen.style.display = 'flex';

  listenToRoom();
  listenToChat();
}

leaveBtn.addEventListener('click', () => {
  if(unsubRoom) unsubRoom();
  if(unsubChat) unsubChat();
  mainScreen.style.display = 'none';
  setupScreen.style.display = 'flex';
});

// ===== Sync book & page =====
function listenToRoom(){
  unsubRoom = roomRef.onSnapshot(doc => {
    const data = doc.data();
    if(!data) return;
    pages = data.pages || [];
    currentPage = data.currentPage || 0;
    renderPage();
  });
}

function renderPage(){
  if(pages.length === 0){
    bookText.textContent = 'Пока нет текста. Загрузите файл .txt.';
    pageIndicator.textContent = '— / —';
    return;
  }
  if(currentPage < 0) currentPage = 0;
  if(currentPage > pages.length-1) currentPage = pages.length-1;
  bookText.textContent = pages[currentPage];
  pageIndicator.textContent = (currentPage+1) + ' / ' + pages.length;
  prevBtn.disabled = currentPage === 0;
  nextBtn.disabled = currentPage === pages.length-1;
}

prevBtn.addEventListener('click', () => changePage(-1));
nextBtn.addEventListener('click', () => changePage(1));

async function changePage(delta){
  const newPage = currentPage + delta;
  if(newPage < 0 || newPage > pages.length-1) return;
  await roomRef.update({ currentPage: newPage });
}

document.addEventListener('keydown', (e) => {
  if(mainScreen.style.display !== 'flex') return;
  if(document.activeElement === chatInput) return;
  if(e.key === 'ArrowRight') changePage(1);
  if(e.key === 'ArrowLeft') changePage(-1);
});

// ===== Font size =====
fontPlus.addEventListener('click', () => { fontSize = Math.min(fontSize+2, 34); bookText.style.fontSize = fontSize+'px'; });
fontMinus.addEventListener('click', () => { fontSize = Math.max(fontSize-2, 12); bookText.style.fontSize = fontSize+'px'; });

// ===== Upload .txt file and split into pages =====
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const text = ev.target.result;
    const newPages = splitIntoPages(text, 1600);
    await roomRef.update({ pages: newPages, currentPage: 0 });
  };
  reader.readAsText(file, 'UTF-8');
});

function splitIntoPages(text, chunkSize){
  const paragraphs = text.split(/\n+/);
  const result = [];
  let current = '';
  for(const p of paragraphs){
    if((current + '\n\n' + p).length > chunkSize && current.length > 0){
      result.push(current.trim());
      current = p;
    } else {
      current = current ? current + '\n\n' + p : p;
    }
  }
  if(current.trim()) result.push(current.trim());
  return result.length ? result : ['(Пустой файл)'];
}

// ===== Chat =====
function listenToChat(){
  unsubChat = roomRef.collection('messages')
    .orderBy('createdAt', 'asc')
    .limitToLast(100)
    .onSnapshot(snap => {
      messagesEl.innerHTML = '';
      snap.forEach(doc => {
        const m = doc.data();
        const div = document.createElement('div');
        div.className = 'msg' + (m.name === userName ? ' me' : '');
        const nameSpan = document.createElement('span');
        nameSpan.className = 'name';
        nameSpan.textContent = m.name;
        const textNode = document.createTextNode(m.text);
        div.appendChild(nameSpan);
        div.appendChild(textNode);
        messagesEl.appendChild(div);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
}

chatForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = chatInput.value.trim();
  if(!text) return;
  chatInput.value = '';
  await roomRef.collection('messages').add({
    name: userName,
    text: text,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
});
</script>
</body>
</html>
