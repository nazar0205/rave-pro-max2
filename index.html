<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rave PRO MAX</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 10px;
    }
    h1 { margin: 8px 0 16px; font-size: 1.9em; font-weight: bold; }
    
    input {
      background: #1f1f1f;
      border: none;
      color: white;
      padding: 14px;
      margin: 6px 4px;
      border-radius: 12px;
      font-size: 16px;
      width: 240px;
    }
    button {
      background: #ff00aa;
      color: white;
      border: none;
      padding: 14px 20px;
      margin: 6px 4px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
    }
    button:active { transform: scale(0.95); }

    #roomCode { color: #ff00aa; font-size: 1.25em; margin: 12px 0; }

    #videoBox {
      margin: 15px auto;
      max-width: 100%;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      min-height: 260px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .msg {
      display: flex;
      align-items: flex-start;
      margin: 10px 0;
      background: #1f1f1f;
      padding: 12px;
      border-radius: 14px;
      text-align: left;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff00aa, #00ffff);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 12px;
      font-weight: bold;
      font-size: 18px;
    }

    #chat {
      max-height: 42vh;
      overflow-y: auto;
      padding-bottom: 70px;
    }
  </style>
</head>
<body>
  <h1>🎬 RAVE PRO MAX</h1>

  <input id="roomInput" placeholder="Код комнаты">
  <button onclick="joinRoom()">Войти</button>
  <button onclick="createRoom()">Создать</button>

  <h2 id="roomCode">Нет комнаты</h2>
  <hr>

  <input id="videoInput" placeholder="YouTube ссылка">
  <button onclick="setVideo()">Поставить видео</button>

  <div class="controls">
    <button onclick="playVideo()">▶ Play</button>
    <button onclick="pauseVideo()">⏸ Pause</button>
  </div>

  <div id="videoBox"></div>
  <hr>

  <input id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
  <button onclick="sendMsg()">Отправить</button>
  <div id="chat"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  
  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    const firebaseConfig = { /* твой config остаётся тот же */ 
      apiKey: "AIzaSyCdz7f48TYJCH-ourCeeMi3C7ZmSEOr9NU",
      authDomain: "rave-clone-2.firebaseapp.com",
      projectId: "rave-clone-2",
      storageBucket: "rave-clone-2.appspot.com",
      messagingSenderId: "112111623912",
      appId: "1:112111623912:web:85fc83553bea1a35c2735d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let roomCode = "", isHost = false;
    let player;
    let currentVideo = { url: "", playing: false, time: 0, last: Date.now() };

    function createRoom() {
      roomCode = Math.floor(10000 + Math.random() * 90000).toString();
      isHost = true;
      document.getElementById("roomCode").innerText = `Комната: ${roomCode}`;
      db.collection("rooms").doc(roomCode).set({ video: currentVideo });
      listenRoom();
      listenChat();
    }

    function joinRoom() {
      roomCode = document.getElementById("roomInput").value.trim();
      if (!roomCode) return alert("Введите код комнаты!");
      isHost = false;
      document.getElementById("roomCode").innerText = `Комната: ${roomCode}`;
      listenRoom();
      listenChat();
    }

    function getYouTubeId(url) {
      try {
        if (url.includes("youtu.be")) return url.split("/").pop().split("?")[0];
        return new URL(url).searchParams.get("v");
      } catch { return ""; }
    }

    function setVideo() {
      if (!isHost) return alert("Только хозяин может менять видео");
      currentVideo.url = document.getElementById("videoInput").value.trim();
      currentVideo.time = 0;
      currentVideo.playing = false;
      db.collection("rooms").doc(roomCode).update({ video: currentVideo });
    }

    function playVideo() {
      if (!isHost || !player) return;
      player.playVideo();
      currentVideo.playing = true;
      currentVideo.last = Date.now();
      db.collection("rooms").doc(roomCode).update({ video: currentVideo });
    }

    function pauseVideo() {
      if (!isHost || !player) return;
      player.pauseVideo();
      currentVideo.playing = false;
      db.collection("rooms").doc(roomCode).update({ video: currentVideo });
    }

    // YouTube API Ready
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('videoBox', {
        height: '260',
        width: '100%',
        videoId: '',
        playerVars: {
          'autoplay': 0,
          'modestbranding': 1,
          'rel': 0,
          'iv_load_policy': 3
        },
        events: {
          'onReady': onPlayerReady
        }
      });
    }

    function onPlayerReady(event) {
      console.log("YouTube Player готов");
    }

    function renderVideo(v) {
      if (!v.url || !player) return;
      const id = getYouTubeId(v.url);
      if (id) {
        player.loadVideoById(id);
        if (v.playing) {
          player.playVideo();
        } else {
          player.pauseVideo();
        }
      }
    }

    function listenRoom() {
      db.collection("rooms").doc(roomCode).onSnapshot(doc => {
        if (!doc.exists) return;
        currentVideo = doc.data().video;
        renderVideo(currentVideo);
      });
    }

    function sendMsg() {
      const text = document.getElementById("msgInput").value.trim();
      if (!text || !roomCode) return;
      db.collection("rooms").doc(roomCode).collection("chat").add({
        text, avatar: String.fromCharCode(65 + Math.floor(Math.random()*26)), time: Date.now()
      });
      document.getElementById("msgInput").value = "";
    }

    function listenChat() {
      db.collection("rooms").doc(roomCode).collection("chat")
        .orderBy("time")
        .onSnapshot(snap => {
          const chat = document.getElementById("chat");
          chat.innerHTML = "";
          snap.forEach(d => {
            const m = d.data();
            chat.innerHTML += `<div class="msg"><div class="avatar">${m.avatar}</div><div>${m.text}</div></div>`;
          });
          chat.scrollTop = chat.scrollHeight;
        });
    }

    // Загружаем API
    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
  </script>
</body>
</html>
