<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIFE RPG — Протокол</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #101216;
    --bg-grid: #15181d;
    --panel: #1a1d22;
    --panel-2: #21252b;
    --line: #2b3038;
    --text: #e9e7e1;
    --muted: #888d96;
    --amber: #ffb300;
    --danger: #ff6b6b;
    --good: #7ed957;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  body {
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 34px 34px;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* ---------- PASSWORD GATE ---------- */
  #gate {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .gate-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 36px 32px;
    width: 90%; max-width: 340px;
    text-align: center;
  }
  .gate-card .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .gate-card h1 {
    font-size: 20px;
    margin: 0 0 22px;
    font-weight: 600;
  }
  .gate-card input {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }
  .gate-card input:focus { outline: none; border-color: var(--amber); }
  .gate-card button {
    width: 100%;
    background: var(--amber);
    border: none;
    color: #1a1300;
    font-weight: 700;
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    font-size: 14px;
  }
  .gate-card button:hover { filter: brightness(1.08); }
  .gate-error {
    color: var(--danger);
    font-size: 12px;
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 16px;
  }
  .shake { animation: shake 0.35s; }
  @keyframes shake {
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ---------- APP ---------- */
  #app {
    display: none;
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
    margin-bottom: 24px;
  }
  .header .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h1 { font-size: 22px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  .overall { text-align: right; }
  .overall .num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 44px; font-weight: 700; color: var(--amber); line-height: 1;
  }
  .overall .lbl {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px;
  }

  .streak-bar {
    display: flex; align-items: center; gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--muted); margin-bottom: 22px;
  }
  .streak-bar .dot { color: var(--amber); }

  .gauges {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px; margin-bottom: 30px;
  }
  .gauge {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 12px 14px;
    transition: box-shadow 0.3s;
  }
  .gauge.leveled { box-shadow: 0 0 0 1px var(--amber), 0 0 18px rgba(255,179,0,0.35); }
  .gauge .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .gauge .cat-name { font-size: 12px; color: var(--text); font-weight: 600; }
  .gauge .lvl { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; }
  .gauge .track { height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .gauge .fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .gauge .meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; }

  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 12px; padding-top: 6px;
  }

  .task-list { margin-bottom: 26px; }
  .task-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 6px; margin-bottom: 6px;
  }
  .task-row.done { opacity: 0.55; }
  .task-row .chk {
    width: 20px; height: 20px; border-radius: 4px;
    border: 1.5px solid var(--muted); background: transparent; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: var(--bg); font-size: 13px;
  }
  .task-row.done .chk { background: var(--good); border-color: var(--good); }
  .task-row .name { flex: 1; font-size: 13.5px; }
  .task-row .tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 3px; padding: 2px 6px;
  }
  .task-row .xp { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; min-width: 46px; text-align: right; }
  .task-row .mand { color: var(--danger); font-size: 10px; }
  .task-row .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 2px 4px; }
  .task-row .del:hover { color: var(--danger); }

  .add-form {
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 14px; display: grid;
    grid-template-columns: 2fr 1fr 0.8fr auto auto; gap: 8px; align-items: center; margin-bottom: 30px;
  }
  .add-form input[type=text], .add-form select, .add-form input[type=number] {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    border-radius: 4px; padding: 8px 9px; font-size: 13px; font-family: 'Inter', sans-serif; width: 100%;
  }
  .add-form label.mand-check { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); white-space: nowrap; }
  .add-form button {
    background: var(--amber); border: none; color: #1a1300; font-weight: 700;
    border-radius: 4px; padding: 9px 14px; cursor: pointer; font-size: 13px;
  }
  .add-form button:hover { filter: brightness(1.08); }

  .history { margin-bottom: 20px; }
  .hist-row {
    display: flex; justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--muted);
    padding: 6px 0; border-bottom: 1px solid var(--line);
  }
  .hist-row .miss { color: var(--danger); }
  .hist-row .clean { color: var(--good); }

  .footer-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 30px; padding-top: 14px; border-top: 1px solid var(--line);
  }
  .reset-btn {
    background: none; border: 1px solid var(--line); color: var(--muted);
    font-size: 11px; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace;
  }
  .reset-btn:hover { color: var(--danger); border-color: var(--danger); }
  .empty-note { color: var(--muted); font-size: 12px; font-style: italic; margin-bottom: 16px; }

  .toast-wrap {
    position: fixed; top: 18px; right: 18px; z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--panel); border: 1px solid var(--amber); border-radius: 6px;
    padding: 10px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    box-shadow: 0 0 20px rgba(255,179,0,0.25);
    animation: toast-in 0.25s ease;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .sync-note { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card" id="gate-card">
    <div class="eyebrow">Ограниченный доступ</div>
    <h1>LIFE RPG — Протокол</h1>
    <input type="password" id="pw-input" placeholder="Пароль" autocomplete="off" />
    <button id="pw-btn">Войти</button>
    <div class="gate-error" id="pw-error"></div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<div id="app"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
  import {
    getAuth, signInAnonymously, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

  // ---------- FIREBASE CONFIG ----------
  const firebaseConfig = {
    apiKey: "AIzaSyCdz7f48TYJCH-ourCeeMi3C7ZmSEOr9NU",
    authDomain: "rave-clone-2.firebaseapp.com",
    projectId: "rave-clone-2",
    storageBucket: "rave-clone-2.firebasestorage.app",
    messagingSenderId: "112111623912",
    appId: "1:112111623912:web:85fc83553bea1a35c2735d"
  };
  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const auth = getAuth(fbApp);

  const DOC_REF = () => doc(db, "lifeRPG", "state");

  // ---------- PASSWORD GATE ----------
  const PASSWORD = "NAZAR2010.GAME";
  const UNLOCK_KEY = "lrpg_unlocked";

  function showApp() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    boot();
  }

  if (localStorage.getItem(UNLOCK_KEY) === '1') {
    showApp();
  }

  document.getElementById('pw-btn').addEventListener('click', tryUnlock);
  document.getElementById('pw-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryUnlock();
  });

  function tryUnlock() {
    const val = document.getElementById('pw-input').value;
    if (val === PASSWORD) {
      localStorage.setItem(UNLOCK_KEY, '1');
      showApp();
    } else {
      const card = document.getElementById('gate-card');
      document.getElementById('pw-error').textContent = 'Неверный пароль';
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
    }
  }

  // ---------- APP LOGIC ----------
  const CATS = [
    { key: 'SLEEP', label: 'Сон', color: '#6EA8FE' },
    { key: 'BODY', label: 'Тело', color: '#FF6B6B' },
    { key: 'MIND', label: 'Разум', color: '#34D2C0' },
    { key: 'WORK', label: 'Работа', color: '#FFB300' },
    { key: 'MONEY', label: 'Финансы', color: '#7ED957' },
    { key: 'WILL', label: 'Воля', color: '#C792EA' },
  ];
  const MILESTONES = [5, 10, 25, 50, 100];

  function threshold(level) { return level * 100; }

  function todayStr(d) {
    d = d || new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function addDays(dateStr, n) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return todayStr(d);
  }

  function defaultState() {
    const categories = {};
    CATS.forEach(c => categories[c.key] = { level: 1, xp: 0 });
    return {
      tasks: [
        { id: 't1', name: 'Подъём по расписанию', category: 'SLEEP', xp: 15, mandatory: true },
        { id: 't2', name: 'Отбой по расписанию', category: 'SLEEP', xp: 10, mandatory: true },
        { id: 't3', name: 'Тренировка 30+ мин', category: 'BODY', xp: 20, mandatory: false },
        { id: 't4', name: '20 страниц книги', category: 'MIND', xp: 10, mandatory: true },
        { id: 't5', name: '30 мин фокусной учёбы', category: 'MIND', xp: 20, mandatory: false },
        { id: 't6', name: 'Закрытая рабочая задача', category: 'WORK', xp: 25, mandatory: false },
        { id: 't7', name: 'Учёт расходов за день', category: 'MONEY', xp: 5, mandatory: false },
        { id: 't8', name: 'Сделано то, что откладывал', category: 'WILL', xp: 30, mandatory: false },
      ],
      categories,
      todayDate: todayStr(),
      todayChecks: {},
      history: [],
      streak: 0,
    };
  }

  function addCategoryXP(catState, amount) {
    catState.xp += amount;
    if (amount > 0) {
      while (catState.xp >= threshold(catState.level)) {
        catState.xp -= threshold(catState.level);
        catState.level += 1;
      }
    } else if (amount < 0) {
      while (catState.xp < 0) {
        if (catState.level > 1) {
          catState.level -= 1;
          catState.xp += threshold(catState.level);
        } else {
          catState.xp = 0;
          break;
        }
      }
    }
  }
  function applyPenalty(catState, amount) {
    catState.xp -= amount;
    if (catState.xp < 0) catState.xp = 0;
  }

  let state = null;
  let saving = false;

  function toast(msg) {
    const wrap = document.getElementById('toast-wrap');
    const t = document.createElement('div');
    t.className = 'toast mono';
    t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 4200);
  }

  async function loadState() {
    try {
      const snap = await getDoc(DOC_REF());
      if (snap.exists()) return snap.data();
    } catch (e) {
      console.error('load failed', e);
    }
    return null;
  }

  async function saveState() {
    saving = true;
    try {
      await setDoc(DOC_REF(), state);
    } catch (e) {
      console.error('save failed', e);
      toast('⚠ Ошибка сохранения — проверь Firestore правила');
    }
    saving = false;
  }

  function rollover() {
    const now = todayStr();
    let guard = 0;
    while (state.todayDate !== now && guard < 120) {
      guard++;
      const mandatoryTasks = state.tasks.filter(t => t.mandatory);
      let allDone = true;
      mandatoryTasks.forEach(t => {
        const done = !!state.todayChecks[t.id];
        if (!done) {
          allDone = false;
          applyPenalty(state.categories[t.category], t.xp);
        }
      });
      if (mandatoryTasks.length === 0) allDone = false;
      state.streak = allDone ? state.streak + 1 : 0;
      state.history.unshift({
        date: state.todayDate,
        missed: mandatoryTasks.filter(t => !state.todayChecks[t.id]).length,
        totalMandatory: mandatoryTasks.length,
        streakAfter: state.streak,
      });
      state.history = state.history.slice(0, 14);
      state.todayChecks = {};
      state.todayDate = addDays(state.todayDate, 1);
    }
  }

  function overallLevel() {
    const levels = CATS.map(c => state.categories[c.key].level);
    return Math.round(levels.reduce((a, b) => a + b, 0) / levels.length);
  }
  function nextMilestone(level) {
    for (const m of MILESTONES) if (m > level) return m;
    return null;
  }

  function toggleTask(id) {
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;
    const cat = state.categories[task.category];
    const before = cat.level;
    const isDone = !!state.todayChecks[id];
    if (isDone) {
      state.todayChecks[id] = false;
      addCategoryXP(cat, -task.xp);
    } else {
      state.todayChecks[id] = true;
      addCategoryXP(cat, task.xp);
    }
    if (cat.level > before) {
      const catMeta = CATS.find(c => c.key === task.category);
      const nm = nextMilestone(before);
      toast('⚡ LEVEL UP: ' + catMeta.label + ' → ' + cat.level + (nm === cat.level ? ' 🎁 награда!' : ''));
    }
    saveState();
    render();
  }

  function deleteTask(id) {
    const task = state.tasks.find(t => t.id === id);
    if (task && state.todayChecks[id]) {
      addCategoryXP(state.categories[task.category], -task.xp);
    }
    state.tasks = state.tasks.filter(t => t.id !== id);
    delete state.todayChecks[id];
    saveState();
    render();
  }

  function addTask(name, category, xp, mandatory) {
    const id = 't_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
    state.tasks.push({ id, name, category, xp: Math.max(1, xp | 0), mandatory });
    saveState();
    render();
  }

  async function resetAll() {
    if (!confirm('Стереть весь прогресс и задания? Это необратимо.')) return;
    state = defaultState();
    await saveState();
    render();
  }

  function render() {
    const app = document.getElementById('app');
    const lvl = overallLevel();

    const gauges = CATS.map(c => {
      const cs = state.categories[c.key];
      const th = threshold(cs.level);
      const pct = Math.min(100, Math.round((cs.xp / th) * 100));
      const nm = nextMilestone(cs.level);
      return `
        <div class="gauge">
          <div class="top">
            <span class="cat-name">${c.label}</span>
            <span class="lvl" style="color:${c.color}">${cs.level}</span>
          </div>
          <div class="track"><div class="fill" style="width:${pct}%;background:${c.color}"></div></div>
          <div class="meta"><span>${cs.xp}/${th} XP</span><span>${nm ? 'ур.' + nm + ' 🎁' : '—'}</span></div>
        </div>`;
    }).join('');

    const tasksByCat = CATS.map(c => {
      const tasks = state.tasks.filter(t => t.category === c.key);
      if (!tasks.length) return '';
      return tasks.map(t => {
        const done = !!state.todayChecks[t.id];
        return `
          <div class="task-row ${done ? 'done' : ''}">
            <div class="chk" data-toggle="${t.id}">${done ? '✓' : ''}</div>
            <span class="name">${t.name}</span>
            ${t.mandatory ? '<span class="mand">ОБЯЗАТ.</span>' : ''}
            <span class="tag" style="color:${c.color};border-color:${c.color}">${c.label}</span>
            <span class="xp" style="color:var(--good)">+${t.xp}</span>
            <button class="del" data-del="${t.id}" title="Удалить задание">✕</button>
          </div>`;
      }).join('');
    }).join('');

    const catOptions = CATS.map(c => `<option value="${c.key}">${c.label}</option>`).join('');

    const historyRows = state.history.map(h => {
      const clean = h.missed === 0;
      return `
        <div class="hist-row">
          <span>${h.date}</span>
          <span class="${clean ? 'clean' : 'miss'}">${clean ? 'чисто' : h.missed + '/' + h.totalMandatory + ' пропущено'}</span>
          <span>streak: ${h.streakAfter}</span>
        </div>`;
    }).join('');

    app.innerHTML = `
      <div class="header">
        <div>
          <div class="eyebrow">Life RPG · Протокол</div>
          <h1>${todayStr() === state.todayDate ? 'Сегодня, ' + state.todayDate : state.todayDate}</h1>
        </div>
        <div class="overall">
          <div class="num mono">${lvl}</div>
          <div class="lbl">общий уровень</div>
        </div>
      </div>

      <div class="streak-bar mono"><span class="dot">●</span> streak: ${state.streak} ${state.streak > 0 ? 'дн.' : ''} &nbsp;·&nbsp; бонус XP: +${Math.min(50, state.streak * 5)}%</div>

      <div class="gauges">${gauges}</div>

      <div class="section-title">Задания на сегодня</div>
      <div class="task-list">
        ${tasksByCat || '<div class="empty-note">Заданий нет — добавь первое ниже.</div>'}
      </div>

      <div class="section-title">Добавить задание</div>
      <div class="add-form">
        <input type="text" id="new-name" placeholder="Название задания" />
        <select id="new-cat">${catOptions}</select>
        <input type="number" id="new-xp" placeholder="XP" value="10" min="1" />
        <label class="mand-check"><input type="checkbox" id="new-mand" /> обязательное</label>
        <button id="add-btn">Добавить</button>
      </div>

      <div class="section-title">История</div>
      <div class="history">
        ${historyRows || '<div class="empty-note">Пока нет закрытых дней.</div>'}
      </div>

      <div class="footer-row">
        <span class="sync-note">синхронизировано с Firestore</span>
        <button class="reset-btn" id="reset-btn">Сбросить всё</button>
      </div>
    `;

    app.querySelectorAll('[data-toggle]').forEach(elx => {
      elx.addEventListener('click', () => toggleTask(elx.getAttribute('data-toggle')));
    });
    app.querySelectorAll('[data-del]').forEach(elx => {
      elx.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(elx.getAttribute('data-del')); });
    });
    document.getElementById('add-btn').addEventListener('click', () => {
      const name = document.getElementById('new-name').value.trim();
      const category = document.getElementById('new-cat').value;
      const xp = parseInt(document.getElementById('new-xp').value, 10) || 10;
      const mandatory = document.getElementById('new-mand').checked;
      if (!name) return;
      addTask(name, category, xp, mandatory);
    });
    document.getElementById('reset-btn').addEventListener('click', resetAll);
  }

  async function boot() {
    document.getElementById('app').innerHTML = '<p class="mono" style="text-align:center;padding-top:60px;color:var(--muted)">Загрузка...</p>';
    try {
      await signInAnonymously(auth);
    } catch (e) {
      console.error('auth failed', e);
    }
    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      const loaded = await loadState();
      state = loaded || defaultState();
      rollover();
      await saveState();
      render();
    });
  }
</script>
</body>
</html>
