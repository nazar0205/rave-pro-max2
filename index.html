<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Привычки вдвоём 🔥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#0f0c29;
    --bg2:#302b63;
    --bg3:#24243e;
    --panel:rgba(255,255,255,0.06);
    --panel-solid:#181433;
    --border:rgba(255,255,255,0.09);
    --text:#f2f1fb;
    --muted:#9d9bc2;
    --accent:#7c6cf0;
    --accent2:#f065b0;
    --accent3:#4fd6c4;
    --done:#3ddc97;
    --gold:#ffc857;
    --radius:20px;
  }
  body.light{
    --bg1:#eef1fb;
    --bg2:#e4e9fb;
    --bg3:#f6f4ff;
    --panel:rgba(255,255,255,0.75);
    --panel-solid:#ffffff;
    --border:rgba(30,25,60,0.08);
    --text:#1c1a33;
    --muted:#6c6a8c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Inter',sans-serif;
    color:var(--text);
    background: radial-gradient(circle at 15% 20%, var(--bg2) 0%, transparent 45%),
                radial-gradient(circle at 85% 15%, var(--accent2) 0%, transparent 35%),
                radial-gradient(circle at 50% 90%, var(--accent3) 0%, transparent 40%),
                var(--bg1);
    background-attachment:fixed;
    transition:background .3s, color .3s;
  }
  h1,h2,.font-display{font-family:'Poppins',sans-serif;}

  /* ---------- SETUP SCREEN ---------- */
  #setup-screen{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    gap:18px;padding:20px;text-align:center;
  }
  .logo-badge{
    font-size:46px;
    filter:drop-shadow(0 0 20px rgba(124,108,240,.6));
  }
  #setup-screen h1{margin:4px 0;font-size:30px;font-weight:800;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  #setup-screen p{color:var(--muted);margin:0 0 6px 0;max-width:380px;font-size:14.5px;}
  .setup-box{
    background:var(--panel);
    backdrop-filter:blur(18px);
    border:1px solid var(--border);
    padding:30px;
    border-radius:24px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
    display:flex;flex-direction:column;gap:12px;
    width:100%;max-width:360px;
  }
  input, button{font-family:inherit;font-size:15px;}
  .setup-box input{
    padding:13px 14px;
    border:1px solid var(--border);
    border-radius:14px;
    outline:none;
    background:rgba(255,255,255,0.04);
    color:var(--text);
  }
  body.light .setup-box input{background:#f5f4ff;}
  .setup-box input::placeholder{color:var(--muted);}
  .setup-box input:focus{border-color:var(--accent);}
  .btn-primary{
    padding:13px;border:none;border-radius:14px;cursor:pointer;font-weight:700;
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    box-shadow:0 8px 24px rgba(124,108,240,0.4);
    transition:transform .15s;
  }
  .btn-primary:hover{transform:translateY(-2px);}
  .btn-primary:active{transform:translateY(0);}
  .setup-box small{color:var(--muted);}

  /* ---------- MAIN ---------- */
  #main-screen{display:none;max-width:760px;margin:0 auto;padding:18px 16px 60px;position:relative;}

  header{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:14px 18px;
    background:var(--panel);
    backdrop-filter:blur(18px);
    border:1px solid var(--border);
    border-radius:18px;
    margin-bottom:18px;
  }
  .room-badge{
    background:rgba(124,108,240,0.18);
    color:var(--accent);
    padding:7px 12px;border-radius:10px;font-size:13px;font-weight:600;
  }
  header .spacer{flex:1;}
  .icon-btn{
    width:38px;height:38px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.05);
    border-radius:12px;cursor:pointer;font-size:16px;color:var(--text);
  }
  .icon-btn:hover{background:rgba(255,255,255,0.12);}
  .text-btn{
    padding:9px 14px;border:1px solid var(--border);
    background:rgba(255,255,255,0.05);border-radius:12px;cursor:pointer;
    font-size:13.5px;color:var(--text);font-weight:600;
  }
  .text-btn:hover{background:rgba(255,255,255,0.12);}

  /* ---------- STATS DASHBOARD ---------- */
  .stats-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:18px;
  }
  .stat-card{
    background:var(--panel);
    backdrop-filter:blur(18px);
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px 10px;
    text-align:center;
  }
  .stat-num{font-size:22px;font-weight:800;font-family:'Poppins',sans-serif;}
  .stat-label{font-size:10.5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}
  .stat-card.grad .stat-num{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }

  /* ---------- QUOTE ---------- */
  .quote-banner{
    background:linear-gradient(120deg,rgba(124,108,240,0.18),rgba(240,101,176,0.14));
    border:1px solid var(--border);
    border-radius:16px;
    padding:12px 16px;
    margin-bottom:18px;
    font-size:13.5px;
    color:var(--text);
    display:flex;gap:10px;align-items:center;
  }

  /* ---------- ADD HABIT ---------- */
  #add-habit-box{
    background:var(--panel);
    backdrop-filter:blur(18px);
    border:1px solid var(--border);
    border-radius:18px;
    padding:14px;
    margin-bottom:20px;
  }
  .emoji-quick{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .emoji-quick button{
    width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
    background:rgba(255,255,255,0.04);cursor:pointer;font-size:17px;
  }
  .emoji-quick button.active{background:rgba(124,108,240,0.35);border-color:var(--accent);}
  .color-quick{display:flex;gap:6px;margin-bottom:10px;}
  .color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .color-dot.active{border-color:#fff;}
  .add-row{display:flex;gap:8px;}
  .add-row input{
    flex:1;padding:11px 13px;border:1px solid var(--border);border-radius:12px;outline:none;
    background:rgba(255,255,255,0.04);color:var(--text);
  }
  body.light .add-row input{background:#f5f4ff;}
  .add-row button{
    padding:11px 18px;border:none;border-radius:12px;cursor:pointer;font-weight:700;color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }

  /* ---------- HABIT CARD ---------- */
  .habit-card{
    background:var(--panel);
    backdrop-filter:blur(18px);
    border:1px solid var(--border);
    border-radius:20px;
    padding:18px;
    margin-bottom:16px;
    position:relative;
    overflow:hidden;
  }
  .habit-card::before{
    content:'';
    position:absolute;left:0;top:0;bottom:0;width:5px;
    background:var(--habit-color, var(--accent));
  }
  .habit-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .habit-emoji{
    font-size:24px;width:42px;height:42px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,0.06);
    flex-shrink:0;
  }
  .habit-name{font-weight:700;font-size:16px;flex:1;font-family:'Poppins',sans-serif;}
  .celebrate{
    font-size:12px;font-weight:700;color:var(--gold);
    background:rgba(255,200,87,0.15);padding:4px 9px;border-radius:20px;
    animation:pulseGlow 1.4s infinite;
  }
  @keyframes pulseGlow{0%,100%{opacity:1;}50%{opacity:.55;}}
  .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;}
  .del-btn:hover{color:#e05a5a;}

  .progress-track{
    height:6px;border-radius:6px;background:rgba(255,255,255,0.08);
    margin:8px 0 14px 0;overflow:hidden;
  }
  .progress-fill{
    height:100%;border-radius:6px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .4s ease;
  }

  .member-row{display:flex;align-items:center;gap:10px;padding:7px 0;}
  .avatar{
    width:26px;height:26px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:#fff;
  }
  .member-name{
    width:76px;font-size:12.5px;color:var(--muted);flex-shrink:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .days{display:flex;gap:6px;flex:1;}
  .day-dot{
    width:28px;height:28px;border-radius:9px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--muted);flex-shrink:0;
    transition:transform .15s;
  }
  .day-dot.done{
    background:var(--habit-color, var(--done));
    border-color:transparent;
    color:#fff;font-weight:800;
  }
  .day-dot.today{cursor:pointer;box-shadow:0 0 0 2px rgba(255,255,255,0.3) inset;}
  .day-dot.today:hover{transform:scale(1.12);}
  .day-dot.pop{animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(1);}45%{transform:scale(1.35);}100%{transform:scale(1);}}

  .streak{font-size:12px;color:var(--muted);width:56px;text-align:right;flex-shrink:0;}
  .streak b{color:var(--gold);font-weight:800;}
  .streak-fire{margin-right:2px;}

  .duo-streak{
    margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);
    font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px;
  }
  .duo-streak b{color:var(--accent3);}

  .empty-state{
    text-align:center;color:var(--muted);padding:50px 20px;
    background:var(--panel);border-radius:20px;border:1px solid var(--border);
  }

  /* confetti */
  .confetti{
    position:fixed;top:-20px;font-size:20px;pointer-events:none;z-index:999;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(360deg); opacity:0.3; }
  }

  @media (max-width:480px){
    .stats-row{grid-template-columns:repeat(2,1fr);}
    .member-name{width:56px;font-size:11px;}
    .day-dot{width:24px;height:24px;font-size:10px;}
    .streak{width:42px;font-size:10.5px;}
  }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="logo-badge">🔥</div>
  <h1>Привычки вдвоём</h1>
  <p>Один код комнаты на двоих — общий список привычек, стрики и мотивация в реальном времени.</p>
  <div class="setup-box">
    <input id="room-input" placeholder="Код комнаты (например: habits123)" />
    <input id="name-input" placeholder="Ваше имя" />
    <button id="join-btn" class="btn-primary">Войти в комнату →</button>
    <small>Если комнаты ещё нет — она создастся автоматически.</small>
  </div>
</div>

<div id="main-screen">
  <header>
    <span class="room-badge">🏠 <span id="room-label"></span></span>
    <div class="spacer"></div>
    <button class="icon-btn" id="theme-toggle" title="Тема">🌙</button>
    <button class="text-btn" id="leave-btn">Выйти</button>
  </header>

  <div class="stats-row">
    <div class="stat-card grad"><div class="stat-num" id="stat-total">0</div><div class="stat-label">привычек</div></div>
    <div class="stat-card grad"><div class="stat-num" id="stat-today">0%</div><div class="stat-label">сегодня</div></div>
    <div class="stat-card grad"><div class="stat-num" id="stat-best">0</div><div class="stat-label">лучший стрик</div></div>
    <div class="stat-card grad"><div class="stat-num" id="stat-duo">0</div><div class="stat-label">дуо-дней</div></div>
  </div>

  <div class="quote-banner">💬 <span id="quote-text"></span></div>

  <div id="add-habit-box">
    <div class="emoji-quick" id="emoji-quick"></div>
    <div class="color-quick" id="color-quick"></div>
    <div class="add-row">
      <input id="habit-input" placeholder="Новая привычка (например: Зарядка)">
      <button id="add-habit-btn">Добавить</button>
    </div>
  </div>

  <div id="habits-list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ===== Firebase config =====
const firebaseConfig = {
  apiKey: "AIzaSyCdz7f48TYJCH-ourCeeMi3C7ZmSEOr9NU",
  authDomain: "rave-clone-2.firebaseapp.com",
  projectId: "rave-clone-2",
  storageBucket: "rave-clone-2.firebasestorage.app",
  messagingSenderId: "112111623912",
  appId: "1:112111623912:web:85fc83553bea1a35c2735d",
  measurementId: "G-B1Y6LD8858"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== Config data =====
const EMOJIS = ['🔥','📚','💧','🏃','🧘','💤','🥗','✍️','🎯','🎨','💪','🌱','🎧','🧹','☕'];
const COLORS = ['#7c6cf0','#f065b0','#4fd6c4','#ffc857','#ff8a5b','#5b8cff','#ff5b8f'];
const QUOTES = [
  "Маленькие шаги каждый день — большие результаты через месяц.",
  "Не пропускай два дня подряд — это правило держит любую привычку живой.",
  "Ты не обязан быть идеальным, только последовательным.",
  "Лучшее время начать — сегодня. Второе лучшее — завтра.",
  "Стрик — это не про идеальность, а про возвращение снова и снова.",
  "Маленькая победа сегодня — топливо для завтрашней.",
  "Дисциплина — это выбор между тем, что хочешь сейчас, и тем, что хочешь больше всего."
];

// ===== State =====
let roomId=null, userName=null, roomRef=null;
let habits=[], members=[];
let checkinSet=new Set();
let selectedEmoji='🔥', selectedColor=COLORS[0];
let shownMilestones=new Set();
let unsubRoom=null, unsubCheckins=null;

// ===== Elements =====
const setupScreen=document.getElementById('setup-screen');
const mainScreen=document.getElementById('main-screen');
const roomInput=document.getElementById('room-input');
const nameInput=document.getElementById('name-input');
const joinBtn=document.getElementById('join-btn');
const roomLabel=document.getElementById('room-label');
const leaveBtn=document.getElementById('leave-btn');
const themeToggle=document.getElementById('theme-toggle');
const habitInput=document.getElementById('habit-input');
const addHabitBtn=document.getElementById('add-habit-btn');
const habitsList=document.getElementById('habits-list');
const emojiQuick=document.getElementById('emoji-quick');
const colorQuick=document.getElementById('color-quick');
const quoteText=document.getElementById('quote-text');
const statTotal=document.getElementById('stat-total');
const statToday=document.getElementById('stat-today');
const statBest=document.getElementById('stat-best');
const statDuo=document.getElementById('stat-duo');

nameInput.value=localStorage.getItem('habit_name')||'';
roomInput.value=localStorage.getItem('habit_room')||'';

// theme
if(localStorage.getItem('habit_theme')==='light'){
  document.body.classList.add('light');
  themeToggle.textContent='☀️';
}
themeToggle.addEventListener('click', ()=>{
  document.body.classList.toggle('light');
  const isLight=document.body.classList.contains('light');
  themeToggle.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('habit_theme', isLight?'light':'dark');
});

// quote of the day
quoteText.textContent = QUOTES[new Date().getDate() % QUOTES.length];

// emoji quick picks
EMOJIS.forEach(em=>{
  const b=document.createElement('button');
  b.textContent=em;
  if(em===selectedEmoji) b.classList.add('active');
  b.addEventListener('click', ()=>{
    selectedEmoji=em;
    [...emojiQuick.children].forEach(c=>c.classList.remove('active'));
    b.classList.add('active');
  });
  emojiQuick.appendChild(b);
});
COLORS.forEach(c=>{
  const d=document.createElement('div');
  d.className='color-dot'+(c===selectedColor?' active':'');
  d.style.background=c;
  d.addEventListener('click', ()=>{
    selectedColor=c;
    [...colorQuick.children].forEach(x=>x.classList.remove('active'));
    d.classList.add('active');
  });
  colorQuick.appendChild(d);
});

joinBtn.addEventListener('click', joinRoom);
roomInput.addEventListener('keydown', e=>{ if(e.key==='Enter') joinRoom(); });
nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') joinRoom(); });

function slug(name){
  return name.toLowerCase().trim().replace(/[^a-zа-я0-9]+/gi,'_');
}
function avatarColor(name){
  let hash=0;
  for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash);
  return COLORS[Math.abs(hash)%COLORS.length];
}

async function joinRoom(){
  const rId=roomInput.value.trim();
  const name=nameInput.value.trim();
  if(!rId || !name){ alert('Укажите код комнаты и своё имя.'); return; }

  joinBtn.disabled = true;
  joinBtn.textContent = 'Подключение...';

  try{
    roomId=rId; userName=name;
    localStorage.setItem('habit_name',name);
    localStorage.setItem('habit_room',rId);

    roomRef=db.collection('rooms_habits').doc(roomId);
    const snap=await roomRef.get();
    if(!snap.exists){
      await roomRef.set({ habits:[], members:[name], createdAt:firebase.firestore.FieldValue.serverTimestamp() });
    } else {
      await roomRef.update({ members: firebase.firestore.FieldValue.arrayUnion(name) });
    }

    roomLabel.textContent=roomId;
    setupScreen.style.display='none';
    mainScreen.style.display='block';

    listenToRoom();
    listenToCheckins();
  } catch(err){
    console.error('Ошибка входа в комнату:', err);
    alert(
      'Не удалось подключиться к базе данных.\n\n' +
      'Код ошибки: ' + (err.code || err.message || err) + '\n\n' +
      'Частые причины:\n' +
      '1) В Firebase не создана Firestore Database (Build → Firestore Database → Create database)\n' +
      '2) Правила Firestore не разрешают доступ (Rules должны быть allow read, write: if true;)\n' +
      '3) Блокировщик рекламы блокирует запросы к firestore.googleapis.com — попробуйте отключить его для этого сайта\n' +
      '4) Файл открыт напрямую (file://) вместо загрузки через GitHub Pages/сервер'
    );
  } finally {
    joinBtn.disabled = false;
    joinBtn.textContent = 'Войти в комнату →';
  }
}

leaveBtn.addEventListener('click', ()=>{
  if(unsubRoom) unsubRoom();
  if(unsubCheckins) unsubCheckins();
  mainScreen.style.display='none';
  setupScreen.style.display='flex';
});

function listenToRoom(){
  unsubRoom = roomRef.onSnapshot(doc=>{
    const data=doc.data();
    if(!data) return;
    habits=data.habits||[];
    members=data.members||[userName];
    render();
  });
}
function listenToCheckins(){
  unsubCheckins = roomRef.collection('checkins').onSnapshot(snap=>{
    checkinSet=new Set();
    snap.forEach(doc=>{
      const d=doc.data();
      checkinSet.add(d.habitId+'|'+d.date+'|'+d.name);
    });
    render();
  });
}

// ===== Add / delete habit =====
addHabitBtn.addEventListener('click', addHabit);
habitInput.addEventListener('keydown', e=>{ if(e.key==='Enter') addHabit(); });

async function addHabit(){
  const name=habitInput.value.trim();
  if(!name) return;
  const habit={ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), name, emoji:selectedEmoji, color:selectedColor };
  await roomRef.update({ habits: firebase.firestore.FieldValue.arrayUnion(habit) });
  habitInput.value='';
}
async function deleteHabit(habit){
  if(!confirm('Удалить привычку "'+habit.name+'"?')) return;
  await roomRef.update({ habits: firebase.firestore.FieldValue.arrayRemove(habit) });
}

// ===== Dates =====
function dateStr(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function last7Dates(){
  const arr=[];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); arr.push(d); }
  return arr;
}
function calcStreak(habitId, name){
  let streak=0; let d=new Date();
  if(!checkinSet.has(habitId+'|'+dateStr(d)+'|'+name)) d.setDate(d.getDate()-1);
  while(checkinSet.has(habitId+'|'+dateStr(d)+'|'+name)){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}
