<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rave PRO MAX</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 10px;
    }
    h1 { margin: 15px 0 20px; font-size: 2em; color: #ff00aa; }
    
    input, button {
      padding: 14px;
      margin: 6px;
      border-radius: 12px;
      font-size: 16px;
    }
    input { background: #1f1f1f; color: white; border: none; width: 240px; }
    button { background: #ff00aa; color: white; border: none; font-weight: bold; }
    button:active { transform: scale(0.95); }

    #videoBox { margin: 20px auto; max-width: 100%; background: #000; border-radius: 16px; overflow: hidden; }
    video { width: 100%; max-height: 300px; border-radius: 16px; }
  </style>
</head>
<body>
  <h1>🎬 RAVE PRO MAX</h1>

  <input id="roomInput" placeholder="Код комнаты">
  <button onclick="joinRoom()">Войти</button>
  <button onclick="createRoom()">Создать</button>

  <h2 id="roomCode">Нет комнаты</h2>
  <hr>

  <input id="videoInput" placeholder="Прямая MP4 ссылка">
  <button onclick="setVideo()">Поставить фильм</button>

  <div style="margin:15px 0">
    <button onclick="playVideo()">▶ Play</button>
    <button onclick="pauseVideo()">⏸ Pause</button>
  </div>

  <div id="videoBox"></div>
  <hr>

  <input id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
  <button onclick="sendMsg()">Отправить</button>
  <div id="chat"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCdz7f48TYJCH-ourCeeMi3C7ZmSEOr9NU",
      authDomain: "rave-clone-2.firebaseapp.com",
      projectId: "rave-clone-2",
      storageBucket: "rave-clone-2.appspot.com",
      messagingSenderId: "112111623912",
      appId: "1:112111623912:web:85fc83553bea1a35c2735d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let roomCode = "", isHost = false;
    let currentVideo = { url: "", playing: false };
    let videoElement = null;

    function createRoom() {
      roomCode = Math.floor(10000 + Math.random() * 90000).toString();
      isHost = true;
      document.getElementById("roomCode").innerText = `Комната: ${roomCode}`;
      db.collection("rooms").doc(roomCode).set({ video: currentVideo });
      listenRoom();
      listenChat();
    }

    function joinRoom() {
      roomCode = document.getElementById("roomInput").value.trim();
      if (!roomCode) return alert("Введите код комнаты!");
      isHost = false;
      document.getElementById("roomCode").innerText = `Комната: ${roomCode}`;
      listenRoom();
      listenChat();
    }

    function setVideo() {
      if (!isHost) return alert("Только хозяин может ставить фильм");
      currentVideo.url = document.getElementById("videoInput").value.trim();
      currentVideo.playing = true;
      db.collection("rooms").doc(roomCode).update({ video: currentVideo });
    }

    function playVideo() {
      if (videoElement) videoElement.play();
    }

    function pauseVideo() {
      if (videoElement) videoElement.pause();
    }

    function renderVideo(v) {
      const box = document.getElementById("videoBox");
      if (!v.url) {
        box.innerHTML = "<p style='color:#666; padding:80px 20px;'>Фильм ещё не поставлен</p>";
        return;
      }

      box.innerHTML = `
        <video id="mainVideo" width="100%" height="280" controls>
          <source src="${v.url}" type="video/mp4">
        </video>`;

      videoElement = document.getElementById("mainVideo");
      if (v.playing) {
        videoElement.play().catch(() => {});
      }
    }

    function listenRoom() {
      db.collection("rooms").doc(roomCode).onSnapshot(doc => {
        if (doc.exists) {
          currentVideo = doc.data().video;
          renderVideo(currentVideo);
        }
      });
    }

    function sendMsg() {
      const text = document.getElementById("msgInput").value.trim();
      if (!text) return;
      db.collection("rooms").doc(roomCode).collection("chat").add({
        text,
        avatar: String.fromCharCode(65 + Math.floor(Math.random()*26)),
        time: Date.now()
      });
      document.getElementById("msgInput").value = "";
    }

    function listenChat() {
      db.collection("rooms").doc(roomCode).collection("chat")
        .orderBy("time")
        .onSnapshot(snap => {
          const chat = document.getElementById("chat");
          chat.innerHTML = "";
          snap.forEach(d => {
            const m = d.data();
            chat.innerHTML += `<div class="msg"><div class="avatar">${m.avatar}</div><div>${m.text}</div></div>`;
          });
          chat.scrollTop = chat.scrollHeight;
        });
    }
  </script>
</body>
</html>
