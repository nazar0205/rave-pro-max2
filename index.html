<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rave PRO MAX</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 10px;
    }
    h1 { margin: 10px 0 20px; font-size: 2em; }
    
    input, button {
      padding: 14px;
      margin: 6px;
      border-radius: 12px;
      font-size: 16px;
    }
    input {
      background: #1f1f1f;
      color: white;
      border: none;
      width: 240px;
    }
    button {
      background: #ff00aa;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    button:active { transform: scale(0.96); }

    #roomCode { color: #ff00aa; font-size: 1.3em; margin: 15px 0; }

    #videoBox {
      margin: 20px auto;
      max-width: 100%;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(255,0,170,0.3);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    .msg {
      display: flex;
      align-items: flex-start;
      background: #1f1f1f;
      padding: 12px;
      border-radius: 14px;
      margin: 10px 0;
      text-align: left;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff00aa, #00ffff);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 12px;
      font-size: 18px;
      font-weight: bold;
    }

    #chat {
      max-height: 45vh;
      overflow-y: auto;
      text-align: left;
      padding-bottom: 80px;
    }
  </style>
</head>
<body>
  <h1>🎬 RAVE PRO MAX</h1>

  <input id="roomInput" placeholder="Код комнаты">
  <button onclick="joinRoom()">Войти</button>
  <button onclick="createRoom()">Создать</button>

  <h2 id="roomCode">Нет комнаты</h2>
  <hr>

  <input id="videoInput" placeholder="YouTube ссылка">
  <button onclick="setVideo()">Поставить видео</button>

  <div class="controls">
    <button onclick="playVideo()">▶ Play</button>
    <button onclick="pauseVideo()">⏸ Pause</button>
  </div>

  <div id="videoBox"></div>
  <hr>

  <input id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
  <button onclick="sendMsg()">Отправить</button>
  <div id="chat"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCdz7f48TYJCH-ourCeeMi3C7ZmSEOr9NU",
      authDomain: "rave-clone-2.firebaseapp.com",
      projectId: "rave-clone-2",
      storageBucket: "rave-clone-2.appspot.com",
      messagingSenderId: "112111623912",
      appId: "1:112111623912:web:85fc83553bea1a35c2735d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let roomCode = "", isHost = false, player;
    let currentVideo = { url: "", playing: false, time: 0 };

    function createRoom() {
      roomCode = Math.floor(10000 + Math.random() * 90000).toString();
      isHost = true;
      document.getElementById("roomCode").innerText = `Комната: ${roomCode}`;
      db.collection("rooms").doc(roomCode).set({ video: currentVideo });
      listenRoom(); listenChat();
    }

    function joinRoom() {
      roomCode = document.getElementById("roomInput").value.trim();
      if (!roomCode) return alert("Введите код!");
      isHost = false;
      document.getElementById("roomCode").innerText = `Комната: ${roomCode}`;
      listenRoom(); listenChat();
    }

    function getYouTubeId(url) {
      if (url.includes("youtu.be")) return url.split("/").pop().split("?")[0];
      try { return new URL(url).searchParams.get("v"); } catch { return ""; }
    }

    function setVideo() {
      if (!isHost) return alert("Только хозяин может менять видео");
      currentVideo.url = document.getElementById("videoInput").value.trim();
      currentVideo.playing = false;
      db.collection("rooms").doc(roomCode).update({ video: currentVideo });
    }

    function playVideo() { if (isHost && player) player.playVideo(); }
    function pauseVideo() { if (isHost && player) player.pauseVideo(); }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('videoBox', {
        width: '100%',
        height: '260',
        videoId: '',
        playerVars: { 'autoplay': 0, 'modestbranding': 1, 'rel': 0 }
      });
    }

    function renderVideo(v) {
      if (!v.url || !player) return;
      const id = getYouTubeId(v.url);
      if (id) player.loadVideoById(id);
    }

    function listenRoom() {
      db.collection("rooms").doc(roomCode).onSnapshot(doc => {
        if (doc.exists) {
          currentVideo = doc.data().video;
          renderVideo(currentVideo);
        }
      });
    }

    function sendMsg() {
      const text = document.getElementById("msgInput").value.trim();
      if (!text) return;
      db.collection("rooms").doc(roomCode).collection("chat").add({
        text, avatar: String.fromCharCode(65 + Math.floor(Math.random()*26)), time: Date.now()
      });
      document.getElementById("msgInput").value = "";
    }

    function listenChat() {
      db.collection("rooms").doc(roomCode).collection("chat")
        .orderBy("time").onSnapshot(snap => {
          const chat = document.getElementById("chat");
          chat.innerHTML = "";
          snap.forEach(d => {
            const m = d.data();
            chat.innerHTML += `<div class="msg"><div class="avatar">${m.avatar}</div><div>${m.text}</div></div>`;
          });
          chat.scrollTop = chat.scrollHeight;
        });
    }

    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
  </script>
</body>
</html>
